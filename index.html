<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valeria & Diego - Boda</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@300&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #fcfbf9; /* Color cremita de tu diseño */
            color: #5a4a42;
            text-align: center;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 20px solid #fff; /* Marco blanco como en tus capturas */
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            margin-bottom: 10px;
            font-weight: 400;
        }

        h2 {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        .divider {
            width: 50px;
            height: 1px;
            background-color: #5a4a42;
            margin: 20px 0;
        }

        .btn-test {
            margin-top: 30px;
            padding: 12px 30px;
            background-color: #a68b7c; /* El color café rosado de tus botones */
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-test:hover {
            background-color: #8e7568;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h2>Prueba de Conexión</h2>
        <h1>Valeria & Diego</h1>
        <div class="divider"></div>
        <p>¡Si estás viendo esto, GitHub Pages funciona!</p>
        <a href="#" class="btn-test">Ir al mapa (Prueba)</a>
    </section>

</body>
</html>
